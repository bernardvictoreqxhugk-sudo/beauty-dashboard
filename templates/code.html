"""快速词云生成：基于美妆评论情感分析"""
import pandas as pd, jieba, numpy as np
from wordcloud import WordCloud
import matplotlib.pyplot as plt, matplotlib.font_manager as fm

FONT_PATH = '/System/Library/Fonts/STHeiti Medium.ttc'

def segment(text):
    words = jieba.lcut(str(text))
    return [w for w in words
            if len(w)>=2 and w not in stop_words and not w.isdigit()]

def make_wordcloud(texts, title, filename, colormap='viridis'):
    all_words = [w for t in texts for w in segment(t)]
    word_freq = {}
    for w in all_words:
        word_freq[w] = word_freq.get(w, 0) + 1

    wc = WordCloud(font_path=FONT_PATH, width=1000, height=700,
                   background_color='white', max_words=180,
                   colormap=colormap, collocations=False, scale=1.5)
    wc.generate_from_frequencies(word_freq)

    fig, ax = plt.subplots(figsize=(12, 9))
    ax.imshow(wc, interpolation='bilinear'); ax.axis('off')
    ax.set_title(title, fontproperties=FONT_PROP, fontsize=20,
                 fontweight='bold', pad=20)
    plt.savefig(filename, dpi=150, bbox_inches='tight'); plt.close()
